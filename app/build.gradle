plugins {
    id 'com.android.application'
}

android {
    compileSdkVersion 34
    namespace 'com.shadownex.calculator'

    defaultConfig {
        applicationId "com.shadownex.calculator"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
